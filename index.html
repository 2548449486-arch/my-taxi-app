<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#080E1A!important;color:#F1F5F9;font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{min-height:100vh}
input,select,button,textarea{font-family:'DM Sans',-apple-system,sans-serif}
input:focus{outline:none}
select:focus{outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* BG */
#bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 5% 8%, rgba(245,158,11,.07) 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 90% 88%, rgba(99,102,241,.06) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 55% 40%, rgba(20,184,166,.04) 0%, transparent 50%),
    #080E1A;
}
#grid-layer{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);
  background-size:48px 48px;
}

/* SPLASH */
@keyframes rayRot{to{transform:rotate(360deg)}}
@keyframes sunPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes sfill{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.65);opacity:.3}40%{transform:scale(1.2);opacity:1}}
@keyframes cin{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:.35}50%{opacity:.9}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 0 8px rgba(245,158,11,.08)}}

.splash-ring{position:absolute;inset:-14px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(245,158,11,.7) 10deg,transparent 20deg,transparent 30deg,rgba(245,158,11,.55) 40deg,transparent 50deg,transparent 60deg,rgba(245,158,11,.6) 70deg,transparent 80deg,transparent 90deg,rgba(245,158,11,.5) 100deg,transparent 110deg,transparent 120deg,rgba(245,158,11,.55) 130deg,transparent 140deg,transparent 150deg,rgba(245,158,11,.6) 160deg,transparent 170deg,transparent 180deg,rgba(245,158,11,.5) 190deg,transparent 200deg,transparent 210deg,rgba(245,158,11,.55) 220deg,transparent 230deg,transparent 240deg,rgba(245,158,11,.6) 250deg,transparent 260deg,transparent 270deg,rgba(245,158,11,.5) 280deg,transparent 290deg,transparent 300deg,rgba(245,158,11,.55) 310deg,transparent 320deg,transparent 330deg,rgba(245,158,11,.6) 340deg,transparent 350deg,transparent 360deg);
  filter:blur(5px);animation:rayRot 8s linear infinite}
.splash-glow{position:absolute;inset:-4px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.18) 30%,transparent 70%);
  animation:sunPulse 2.2s ease-in-out infinite}
.splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#F59E0B,#FBBF24);border-radius:99px;animation:sfill 2.1s cubic-bezier(.4,0,.2,1) forwards}

.dot{animation:dotPulse 1.2s ease-in-out infinite}
.d0{animation-delay:0s}.d1{animation-delay:.18s}.d2{animation-delay:.36s}

.pc{animation:cin .38s cubic-bezier(.34,1.5,.64,1) both}
.pc0{animation-delay:0s}.pc1{animation-delay:.07s}.pc2{animation-delay:.14s}
.pc3{animation-delay:.21s}.pc4{animation-delay:.28s}.pc5{animation-delay:.35s}
.pc6{animation-delay:.42s}.pc7{animation-delay:.49s}.pc8{animation-delay:.56s}

.slide-up{animation:slideUp .28s cubic-bezier(.34,1.2,.64,1)}
.fade-in{animation:fadeIn .3s ease}
.top-shimmer{animation:shimmer 2.4s ease-in-out infinite}
.best-glow{animation:glowPulse 2.5s ease-in-out infinite}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(245,158,11,.18);border-radius:99px}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ========== SAFE STORAGE WRAPPER ==========
// 解决本地 file:// 协议或部分受限浏览器直接操作 localStorage 引发的崩溃
const safeStorage = {
  get: (key, def) => {
    try { return localStorage.getItem(key) || def; } 
    catch(e) { return def; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, val); } 
    catch(e) {}
  }
};

// ========== DATA ==========
const CITY_DB = {
  '上海':{base:14,perKm:2.5,perMin:.5,hitchBase:10,hitchKm:1.2,surge_peak:1.30,surge_rain:1.22,spd_pk:20,spd_nm:30,metroBase:3,metroCap:14,busPrice:2,hasMetro:true,tier:1},
  '北京':{base:13,perKm:2.3,perMin:.5,hitchBase:9,hitchKm:1.1,surge_peak:1.35,surge_rain:1.25,spd_pk:18,spd_nm:28,metroBase:3,metroCap:10,busPrice:2,hasMetro:true,tier:1},
  '深圳':{base:11,perKm:2.2,perMin:.45,hitchBase:8.5,hitchKm:1.05,surge_peak:1.28,surge_rain:1.18,spd_pk:20,spd_nm:30,metroBase:2,metroCap:12,busPrice:2,hasMetro:true,tier:1},
  '广州':{base:10,perKm:2.1,perMin:.4,hitchBase:8,hitchKm:1,surge_peak:1.28,surge_rain:1.20,spd_pk:22,spd_nm:32,metroBase:2,metroCap:10,busPrice:2,hasMetro:true,tier:1},
  '杭州':{base:11,perKm:2.1,perMin:.4,hitchBase:8,hitchKm:1,surge_peak:1.25,surge_rain:1.18,spd_pk:22,spd_nm:32,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
  '成都':{base:9,perKm:1.9,perMin:.38,hitchBase:7,hitchKm:.9,surge_peak:1.20,surge_rain:1.15,spd_pk:23,spd_nm:33,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
  '重庆':{base:9,perKm:1.85,perMin:.38,hitchBase:7,hitchKm:.88,surge_peak:1.20,surge_rain:1.12,spd_pk:22,spd_nm:30,metroBase:2,metroCap:8,busPrice:2,hasMetro:true,tier:2},
  '武汉':{base:9,perKm:1.9,perMin:.38,hitchBase:7,hitchKm:.9,surge_peak:1.20,surge_rain:1.15,spd_pk:23,spd_nm:33,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
  '南京':{base:10,perKm:2,perMin:.4,hitchBase:7.5,hitchKm:.95,surge_peak:1.22,surge_rain:1.15,spd_pk:24,spd_nm:34,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
  '西安':{base:8,perKm:1.8,perMin:.35,hitchBase:6.5,hitchKm:.85,surge_peak:1.18,surge_rain:1.12,spd_pk:25,spd_nm:36,metroBase:2,metroCap:6,busPrice:1,hasMetro:true,tier:3},
  '长沙':{base:8,perKm:1.75,perMin:.35,hitchBase:6,hitchKm:.82,surge_peak:1.18,surge_rain:1.10,spd_pk:26,spd_nm:36,metroBase:2,metroCap:6,busPrice:1,hasMetro:true,tier:3},
  '郑州':{base:8,perKm:1.8,perMin:.35,hitchBase:6.5,hitchKm:.85,surge_peak:1.18,surge_rain:1.10,spd_pk:25,spd_nm:35,metroBase:2,metroCap:6,busPrice:1,hasMetro:true,tier:3},
  '天津':{base:10,perKm:2,perMin:.4,hitchBase:7.5,hitchKm:.95,surge_peak:1.22,surge_rain:1.15,spd_pk:24,spd_nm:34,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
  '苏州':{base:10,perKm:2,perMin:.4,hitchBase:7.5,hitchKm:.95,surge_peak:1.22,surge_rain:1.15,spd_pk:24,spd_nm:34,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:2},
};
const DEF_CITY = {base:9,perKm:1.9,perMin:.38,hitchBase:7,hitchKm:.9,surge_peak:1.20,surge_rain:1.15,spd_pk:25,spd_nm:35,metroBase:2,metroCap:8,busPrice:1.5,hasMetro:true,tier:3};

const PLATFORMS = [
  {id:'hua',name:'花小猪',icon:'🐷',factor:.87,coupon:'首单-¥8',url:'https://x.huaxz.cn/R2WQ955?source_id=458986jutuike123456&ref_from=dunion',color:'#EC4899'},
  {id:'tongcheng',name:'同程出行',icon:'🚌',factor:.93,coupon:'最高减¥15',url:'https://wx.17u.cn/carfe/app/slCoupons?mark=t6255690',color:'#3B82F6'},
  {id:'didi',name:'滴滴快车',icon:'🚖',factor:1.00,coupon:'新客立减¥10',url:'https://v.didi.cn/kwoQAa7?source_id=458986jutuike123456&ref_from=dunion',color:'#F59E0B'},
  {id:'t3',name:'T3出行',icon:'🚗',factor:.95,coupon:'新人享优惠',url:'https://t3go.cn',color:'#14B8A6'},
  {id:'gaode',name:'高德打车',icon:'🗺️',factor:.97,coupon:'免佣金补贴',url:'https://www.amap.com',color:'#6366F1'},
];

const WEATHER_META = {
  sunny:{label:'晴天',icon:'☀️'},
  rain:{label:'小雨',icon:'🌧️'},
  storm:{label:'暴雨',icon:'⛈️'},
};
const TIME_META = {
  normal:{label:'平峰',icon:'🟢'},
  peak:{label:'高峰',icon:'🔴'},
  night:{label:'深夜',icon:'🌙'},
};
const PLACES = ['首都国际机场','大兴国际机场','虹桥机场','浦东国际机场','南京东路','陆家嘴','人民广场','徐家汇','天安门','三里屯','深圳北站','广州南站','西湖','天府广场','解放碑','公司','家','高铁站','地铁站','购物中心','医院','大学城'];

// ========== ENGINE ==========
function getSurge(cd, weather, time) {
  let m = 1;
  if (weather === 'rain') m *= cd.surge_rain;
  if (weather === 'storm') m *= cd.surge_rain * 1.16;
  if (time === 'peak') m *= cd.surge_peak;
  if (time === 'night') m *= 0.92;
  return m;
}

function estMin(km, cd, time) {
  const spd = time === 'peak' ? cd.spd_pk : time === 'night' ? cd.spd_nm * 1.15 : cd.spd_nm;
  return Math.max(3, Math.round(km / spd * 60));
}

function r1(v) { return Math.round(v * 10) / 10; }

function generatePlans(km, cd, weather, time) {
  if (!km || km < 0.5) return [];
  const surge = getSurge(cd, weather, time);
  const baseMin = estMin(km, cd, time);
  const basePrice = (cd.base + km * cd.perKm + baseMin * cd.perMin) * surge;
  const plans = [];

  if (km <= 2) {
    plans.push({
      id:'walk', type:'active', name:'步行', icon:'🚶', color:'#34D399',
      price:0, minutes:Math.round(km/0.083), waitMin:0,
      coupon:'免费 · 零碳出行', url:null,
      breakdown:[{label:'步行速度',value:'约5km/h'},{label:'消耗热量',value:'约'+Math.round(km*68)+'千卡'}],
    });
  }

  if (km <= 15) {
    const bikeMin = Math.round(km / 0.2);
    const blocks = Math.ceil(bikeMin / 30);
    plans.push({
      id:'bike', type:'active', name:'共享单车', icon:'🚲', color:'#FCD34D',
      price: r1(blocks * 1.5), minutes: bikeMin, waitMin:1,
      coupon:'¥1.5/30min · 最省钱', url:null,
      breakdown:[{label:'骑行时间',value:bikeMin+'min'},{label:'计费',value:'¥1.5/30min x '+blocks+'块'}],
    });
  }

  if (km <= 25) {
    const busMin = Math.round(km / 0.22 + 8);
    const segs = km <= 5 ? 1 : km <= 15 ? 2 : 3;
    plans.push({
      id:'bus', type:'transit', name:'公交车', icon:'🚌', color:'#A78BFA',
      price: r1(segs * cd.busPrice), minutes: busMin, waitMin:5,
      coupon:'固定票价 · 无溢价', url:null,
      breakdown:[{label:'单段票价',value:'¥'+cd.busPrice},{label:'乘坐段数',value:segs+'段'}],
    });
  }

  if (cd.hasMetro && km <= 45) {
    const mPrice = Math.min(Math.round(cd.metroBase + km * 0.1), cd.metroCap);
    const mMin = Math.round(km / 0.65 + 11);
    plans.push({
      id:'metro', type:'transit', name:'地铁', icon:'🚇', color:'#60A5FA',
      price:mPrice, minutes:mMin, waitMin:3,
      coupon:'固定票价 · 准时可靠', url:null,
      breakdown:[{label:'起步价',value:'¥'+cd.metroBase},{label:'封顶价',value:'¥'+cd.metroCap},{label:'预计时长',value:mMin+'min'}],
    });
  }

  if (km >= 3) {
    const hitchPrice = r1(cd.hitchBase + km * cd.hitchKm);
    const hitchWait = Math.round(km / 7 + 3);
    plans.push({
      id:'hitch', type:'hitch', name:'顺风车', icon:'🟡', color:'#10B981',
      price:hitchPrice, minutes:baseMin + hitchWait, waitMin:hitchWait,
      coupon:'固定价 · 不随天气涨价', url:'https://v.didi.cn/3Zajzk5?source_id=458986jutuike123456&ref_from=dunion',
      breakdown:[
        {label:'起步价',value:'¥'+cd.hitchBase},
        {label:'里程费',value:'¥'+r1(km*cd.hitchKm)},
        {label:'动态系数',value:'×1.00（固定不变）'},
      ],
    });
  }

  PLATFORMS.forEach(p => {
    const noise = 0.96 + Math.random() * 0.07;
    const price = r1(basePrice * p.factor * noise);
    const wait = Math.round(2 + Math.random() * 4);
    plans.push({
      id:p.id, type:'ridehail', name:p.name, icon:p.icon, color:p.color,
      price, minutes:baseMin + wait, waitMin:wait,
      coupon:p.coupon, url:p.url,
      breakdown:[
        {label:'起步价',value:'¥'+cd.base.toFixed(1)},
        {label:'里程费',value:'¥'+r1(km*cd.perKm)},
        {label:'时长费',value:'¥'+r1(baseMin*cd.perMin)},
        {label:'溢价系数',value:'×'+surge.toFixed(2)},
        ...(p.factor < 1 ? [{label:'平台折扣',value:'×'+p.factor}] : []),
      ],
    });
  });

  if (cd.hasMetro && km > 10) {
    const txKm = Math.min(5, r1(km * 0.28));
    const txMin = estMin(txKm, cd, time);
    const txPrice = r1((cd.base + txKm * cd.perKm + txMin * cd.perMin) * surge);
    const mKm = km - txKm - 0.8;
    const mPrice = Math.min(Math.round(cd.metroBase + mKm * 0.1), cd.metroCap);
    const mMin = Math.round(mKm / 0.65 + 8);
    const comboTotal = r1(txPrice + mPrice);
    const comboMin = txMin + 4 + mMin;
    const cheapRide = r1(basePrice * 0.87);

    if (comboTotal < cheapRide * 0.83) {
      const saving = r1(cheapRide - comboTotal);
      plans.push({
        id:'combo', type:'combo', name:'接驳换乘', icon:'🔀', color:'#14B8A6',
        price:comboTotal, minutes:comboMin, waitMin:3,
        coupon:`比纯打车省¥${saving}`, url:null, isCombo:true,
        comboSteps:[
          {icon:'🚖', label:`打车${txKm}km至地铁口`, duration:txMin, price:txPrice},
          {icon:'🚶', label:'步行进站', duration:4, price:0},
          {icon:'🚇', label:`地铁${r1(mKm)}km直达`, duration:mMin, price:mPrice},
        ],
        breakdown:[
          {label:'网约车段',value:`¥${txPrice} · ${txMin}min`},
          {label:'地铁段',value:`¥${mPrice} · ${mMin}min`},
          {label:'合计费用',value:`¥${comboTotal}`},
          {label:'合计时间',value:`${comboMin}min`},
        ],
      });
    }
  }

  const pricedPlans = plans.filter(p => p.price > 0);
  const maxP = Math.max(...pricedPlans.map(p => p.price), 1);
  const maxM = Math.max(...pricedPlans.map(p => p.minutes), 1);
  plans.forEach(p => {
    if (p.price === 0) { p.effScore = 98; return; }
    const cs = (1 - p.price / maxP) * 48;
    const ts = (1 - Math.min(p.minutes, maxM) / maxM) * 30;
    const comfort = p.type==='ridehail'?18:p.type==='hitch'?15:p.type==='combo'?18:p.type==='transit'?9:p.type==='active'&&p.id==='bike'?7:3;
    p.effScore = Math.min(97, Math.round(cs + ts + comfort));
  });
  return plans.sort((a, b) => b.effScore - a.effScore);
}

function getSunnyInsight(km, weather, time, cd, plans, cityName) {
  const surge = getSurge(cd, weather, time);
  const isPeak = time === 'peak';
  const isRain = weather !== 'sunny';
  const rides = plans.filter(p => p.type === 'ridehail').sort((a,b) => a.price - b.price);
  const cheapRide = rides[0];
  const hitch = plans.find(p => p.type === 'hitch');
  const metro = plans.find(p => p.id === 'metro');
  const combo = plans.find(p => p.type === 'combo');
  const best = plans[0];

  if (km <= 1.5) return `${km}km以内，步行比叫车更聪明。叫车等待需要${cheapRide?.waitMin||3}分钟，步行只需${Math.round(km/0.083)}分钟，时间差几乎为零。不用掏手机，直接走。`;

  if (km <= 3 && weather === 'sunny' && time !== 'peak') {
    const bikeP = plans.find(p => p.id==='bike');
    const bikeSave = bikeP ? r1((cheapRide?.price||0) - bikeP.price) : 0;
    return `晴天短途${km}km，共享单车是最优解。骑行${bikeP?.minutes||0}分钟、只花¥${bikeP?.price||0}，比打车省¥${bikeSave}，还能顺便运动一下。打车在这个距离是在浪费等待时间。`;
  }

  if (isPeak && isRain && hitch) {
    const diff = r1((cheapRide?.price||0) - hitch.price);
    return `双重压力：${TIME_META[time].label}+${WEATHER_META[weather].label}，网约车溢价已达×${surge.toFixed(2)}，且等待拉长至${cheapRide?.waitMin||5}min以上。顺风车固定价¥${hitch.price}锁死不涨价，比最便宜网约车省¥${diff}。多等${hitch.waitMin}分钟，完全值得。`;
  }

  if (isPeak && metro && metro.price < (cheapRide?.price||0) * 0.5 && km > 5) {
    const saving = r1((cheapRide?.price||0) - metro.price);
    const timeDiff = metro.minutes - (cheapRide?.minutes||0);
    return `${cityName||''}高峰期，路面溢价×${cd.surge_peak}。地铁¥${metro.price}比打车省¥${saving}，时间${timeDiff > 0 ? '多'+timeDiff : '少'+Math.abs(timeDiff)}分钟——但高峰期打车实际更堵，地铁的时间优势被严重低估了。`;
  }

  if (isRain && hitch) {
    const diff = r1((cheapRide?.price||0) - hitch.price);
    return `${WEATHER_META[weather].label}天叫车需求激增，溢价×${surge.toFixed(2)}已生效。顺风车固定价¥${hitch.price}不跟天气上涨，比最便宜网约车省¥${diff}。雨天顺风是最优解，多等${hitch.waitMin}分钟换来固定价。`;
  }

  if (combo && combo.price < (cheapRide?.price||0) * 0.75 && km > 12) {
    const saving = Math.round((cheapRide?.price||0) - combo.price);
    return `${km}km中长途，接驳方案可省¥${saving}（${Math.round(saving/((cheapRide?.price||1))*100)}%）：打车${combo.comboSteps?.[0]?.duration}分钟至地铁站¥${combo.comboSteps?.[0]?.price}，再坐地铁直达¥${combo.comboSteps?.[2]?.price}，总计¥${combo.price}。比纯打车值得多。`;
  }

  const maxRideP = rides[rides.length-1]?.price || 0;
  const diff = r1(maxRideP - (cheapRide?.price||0));
  return `当前${WEATHER_META[weather].label}平峰，各平台差价¥${diff}。${best.name}效率评分最高（${best.effScore}分），${best.coupon}。${hitch?`顺风车¥${hitch.price}固定价也是不错选择。`:''}`;
}

function App() {
  const [splash, setSplash] = useState(true);
  const [from, setFrom] = useState('');

  const [km, setKm] = useState('');
  const [weather, setWeather] = useState('sunny');
  const [time, setTime] = useState('normal');
  
  // 接入 safeStorage
  const [city, setCity] = useState(() => safeStorage.get('sunny_city', '上海'));
  const [phase, setPhase] = useState('input');
  const [plans, setPlans] = useState([]);
  const [insight, setInsight] = useState('');
  const [insightLoading, setInsightLoading] = useState(false);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [totalSaved, setTotalSaved] = useState(() => parseFloat(safeStorage.get('sunny_saved', '0')));
  const [searching, setSearching] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const resultRef = useRef(null);

  const cd = CITY_DB[city] || DEF_CITY;

  const cycleWeather = () => {
    const ws = ['sunny','rain','storm'];
    setWeather(ws[(ws.indexOf(weather)+1)%ws.length]);
  };
  const cycleTime = () => {
    const ts = ['normal','peak','night'];
    setTime(ts[(ts.indexOf(time)+1)%ts.length]);
  };
  const handleSwap = () => {
    const tmp = from; setFrom(to); setTo(tmp);
  };
  const handleKmSelect = v => setKm(String(v));

  const handleSearch = () => {
    const kmV = parseFloat(km);
    if (!kmV || kmV < 0.5) { alert('请输入有效的行程距离（≥0.5km）'); return; }
    setSearching(true);
    setTimeout(() => {
      const newPlans = generatePlans(kmV, cd, weather, time);
      setPlans(newPlans);
      setPhase('results');
      setSearching(false);
      setInsight('');
      setInsightLoading(true);

      const rides = newPlans.filter(p=>p.type==='ridehail').sort((a,b)=>a.price-b.price);
      const hitch = newPlans.find(p=>p.type==='hitch');
      if (rides.length && hitch) {
        const saving = Math.max(0, rides[rides.length-1].price - hitch.price);
        if (saving > 0) {
          const ns = totalSaved + saving;
          setTotalSaved(ns);
          safeStorage.set('sunny_saved', ns.toFixed(2));
        }
      }
      setTimeout(() => {
        setInsightLoading(false);
        setInsight(getSunnyInsight(kmV, weather, time, cd, newPlans, city));

  };

  };

  return (
    <div style={{maxWidth:480,margin:'0 auto',padding:'0 13px 88px',position:'relative',zIndex:1}}>

        <div className="fade-in">

            <div style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,.3)',marginBottom:12,display:'flex',alignItems:'center',gap:7}}>
              行程规划 <div style={{flex:1,height:1,background:'rgba(255,255,255,.06)'}}/>
            </div>

            {/* 修复了原代码中在此处重复写了两次 letterSpacing 的冗余 */}
            <div style={{fontSize:'0.62rem',fontFamily:"'DM Mono'",color:'rgba(255,255,255,.28)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.1em'}}>快速选距</div>
            
            <QuickDist onSelect={handleKmSelect}/>

              `${TIME_META[time].icon}
